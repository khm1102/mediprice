db:
  url: ${DB_URL:jdbc:postgresql://localhost:5432/mediprice}
  username: ${DB_USERNAME:admin}
  # 의도적으로 fallback 없음: 환경변수 누락 시 부팅 실패 (약한 비밀번호로 운영 가는 사고 차단)
  password: ${DB_PASSWORD}
  pool-size: ${DB_POOL_SIZE:30}
  min-idle: ${DB_MIN_IDLE:10}
  # PostgreSQL idle_in_transaction_session_timeout보다 짧게 (default 30분)
  max-lifetime: ${DB_MAX_LIFETIME:1800000}
  # >0이면 활성화. 운영은 30000ms (30s) 권장. 0 = 비활성
  leak-detection: ${DB_LEAK_DETECTION:0}

jpa:
  # 운영 환경에서는 반드시 validate 사용. 개발 편의를 위해 update 기본값 유지
  ddl-auto: ${JPA_DDL_AUTO:update}
  # 운영 PII 노출 방지를 위해 기본값 false. 개발 시 환경변수로 true 지정
  show-sql: ${JPA_SHOW_SQL:false}
  format-sql: ${JPA_FORMAT_SQL:false}

jwt:
  # 기본값 의도적으로 제거: 환경변수 미지정 시 빈 주입 단계에서 부팅 실패
  # 운영 키는 32바이트(256비트) 이상 HMAC-SHA256 호환 키여야 함 (P1 JwtUtil에서 길이 검증)
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

naver:
  map-key: ${NAVER_MAP_KEY:}

hira:
  api-key: ${HIRA_API_KEY:your-hira-key}

cache:
  # 주의: ConcurrentMapCacheManager는 TTL 미지원. 이 값은 현재 적용되지 않음
  ttl-seconds: ${CACHE_TTL_SECONDS:3600}

guest:
  search-limit: ${GUEST_SEARCH_LIMIT:3}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080}
